<svg xmlns="http://www.w3.org/2000/svg" width="420" height="220" viewBox="0 0 420 220" fill="none" role="img" aria-label="Achylo donation widget with progress bar">
  <defs>
    <style>
      .ach-sans { font-family: "DM Sans", system-ui, -apple-system, sans-serif; }
      .ach-title { font-size: 26px; font-weight: 500; fill: #1a1a1a; letter-spacing: -0.02em; }
      .ach-sub { font-size: 16px; font-weight: 500; fill: #6b6b6b; letter-spacing: -0.01em; }
      .ach-meta { font-size: 14px; font-weight: 500; fill: #6b6b6b; }
      .ach-btn { font-size: 15px; font-weight: 500; fill: #ffffff; }
    </style>
  </defs>

  <!-- Card -->
  <rect x="10" y="10" width="400" height="200" rx="20" fill="#ffffff" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <rect x="10" y="10" width="400" height="200" rx="20" fill="url(#cardShadow)" opacity="0.04"/>
  <defs>
    <linearGradient id="cardShadow" x1="210" y1="10" x2="210" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <!-- Amounts -->
  <text x="30" y="58" class="ach-sans ach-title">USDC 23,505</text>
  <text x="196" y="58" class="ach-sans ach-sub">of USDC 80,000</text>

  <!-- Progress track -->
  <rect x="30" y="78" width="360" height="7" rx="3.5" fill="#f0f0f2"/>
  <!-- Progress fill (~29.4%) -->
  <rect x="30" y="78" width="106" height="7" rx="3.5" fill="#ff7f41"/>

  <!-- Percent -->
  <text x="30" y="108" class="ach-sans ach-meta">29.4% achieved</text>

  <!-- Donate button (pill) -->
  <rect x="30" y="132" width="360" height="48" rx="24" fill="#ff7f41"/>
  <text x="210" y="162" text-anchor="middle" class="ach-sans ach-btn">Donate</text>
</svg>
