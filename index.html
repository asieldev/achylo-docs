<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Achylo Pay Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Achylo Pay developer documentation. Payment links, webhooks, and API reference for USDC payments on Base." />

  <!-- Open Graph / Social Media Preview -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://docs.achylo.com/" />
  <meta property="og:site_name"   content="Achylo Pay" />
  <meta property="og:title"       content="Achylo Pay Docs" />
  <meta property="og:description" content="Developer documentation for Achylo Pay. Payment links, webhooks, API keys, and USDC integration guides for TypeScript, Python, and PHP." />
  <meta property="og:image"       content="https://docs.achylo.com/assets/images/og-banner.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt"    content="Achylo Pay - USDC payments on Base" />
  <meta property="og:locale"      content="es_LA" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:site"        content="@achylo_protocol" />
  <meta name="twitter:title"       content="Achylo Pay Docs" />
  <meta name="twitter:description" content="Developer documentation for Achylo Pay. Payment links, webhooks, API keys, and USDC integration guides." />
  <meta name="twitter:image"       content="https://docs.achylo.com/assets/images/og-banner.png?v=1" />
  <meta name="twitter:image:alt"   content="Achylo Pay - USDC payments on Base" />

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="stylesheet" href="modern-style.css" />
  <link rel="icon" type="image/svg+xml" href="assets/images/logo_app.png" />
</head>
<body>
  <div class="language-switcher" id="languageSwitcher" aria-expanded="false">
    <span id="languageLabel">Español</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
  </div>
  <div class="language-options" id="languageOptions" role="menu">
    <button data-lang="es" role="menuitem">🇪🇸 Español</button>
    <button data-lang="en" role="menuitem">🇺🇸 English</button>
    <button data-lang="pt" role="menuitem">🇧🇷 Português</button>
  </div>
  <button class="theme-toggle" id="themeToggle" aria-label="Cambiar entre modo claro y oscuro">
    <span class="icon-sun" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="1" x2="12" y2="3" />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1" y1="12" x2="3" y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
      </svg>
    </span>
    <span class="icon-moon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" />
      </svg>
    </span>
  </button>
  <div id="app"></div>
  <div id="google_translate_container" style="display:none"></div>

  <script>
    window.$docsify = {
      name: 'Achylo Pay',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      search: 'auto',
      logo: 'assets/images/logo.svg'
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script>
    (function () {
      const applyTheme = (theme) => {
        document.body.dataset.theme = theme;
        localStorage.setItem('achylo-theme', theme);
      };

      const resolveInitialTheme = () => {
        const stored = localStorage.getItem('achylo-theme');
        if (stored) return stored;
        return 'light';
      };

      const init = () => {
        applyTheme(resolveInitialTheme());
        const toggle = document.getElementById('themeToggle');
        if (!toggle) return;
        toggle.addEventListener('click', () => {
          const nextTheme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
          applyTheme(nextTheme);
        });
      };

      if (document.readyState !== 'loading') {
        init();
      } else {
        document.addEventListener('DOMContentLoaded', init);
      }
    })();
  </script>
  <script>
    (function () {
      const LANG_KEY = 'achylo-docs-lang';
      const languageSwitcher = document.getElementById('languageSwitcher');
      const languageOptions = document.getElementById('languageOptions');
      const languageLabel = document.getElementById('languageLabel');
      const langMap = { es: 'Español', en: 'English', pt: 'Português' };

      const applyLang = (lang) => {
        const combo = document.querySelector('#google_translate_container select.goog-te-combo');
        if (combo) {
          combo.value = lang;
          combo.dispatchEvent(new Event('change'));
        }
        languageLabel.textContent = langMap[lang] || 'Español';
        [...languageOptions.querySelectorAll('button')].forEach(btn => {
          btn.classList.toggle('active', btn.dataset.lang === lang);
        });
        localStorage.setItem(LANG_KEY, lang);
        languageOptions.style.display = 'none';
        languageSwitcher.setAttribute('aria-expanded', 'false');
      };

      const toggleOptions = () => {
        const isOpen = languageOptions.style.display === 'flex';
        languageOptions.style.display = isOpen ? 'none' : 'flex';
        languageSwitcher.setAttribute('aria-expanded', String(!isOpen));
      };

      languageSwitcher.addEventListener('click', toggleOptions);

      languageOptions.addEventListener('click', (event) => {
        const target = event.target.closest('button');
        if (!target) return;
        applyLang(target.dataset.lang);
      });

      document.addEventListener('click', (event) => {
        if (!languageSwitcher.contains(event.target) && !languageOptions.contains(event.target)) {
          languageOptions.style.display = 'none';
          languageSwitcher.setAttribute('aria-expanded', 'false');
        }
      });

      window.googleTranslateElementInit = function () {
        new google.translate.TranslateElement({
          pageLanguage: 'es',
          includedLanguages: 'es,en,pt',
          autoDisplay: false
        }, 'google_translate_container');

        const storedLang = localStorage.getItem(LANG_KEY) || 'es';
        setTimeout(() => applyLang(storedLang), 50);
      };

      const script = document.createElement('script');
      script.src = '//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
      document.body.appendChild(script);
    })();
  </script>

  <!-- Copy-to-Clipboard for Code Blocks -->
  <script>
    (function () {
      const addCopyButtons = () => {
        const codeBlocks = document.querySelectorAll('.markdown-section pre');
        codeBlocks.forEach((pre) => {
          if (pre.querySelector('.copy-code-btn')) return; // already added

          const btn = document.createElement('button');
          btn.className = 'copy-code-btn';
          btn.setAttribute('type', 'button');
          btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg><span>Copy</span>`;

          btn.addEventListener('click', () => {
            const code = pre.querySelector('code');
            if (!code) return;
            const text = code.innerText;

            navigator.clipboard.writeText(text).then(() => {
              btn.classList.add('copied');
              btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><polyline points="20 6 9 17 4 12"></polyline></svg><span>Copied!</span>`;
              setTimeout(() => {
                btn.classList.remove('copied');
                btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg><span>Copy</span>`;
              }, 2000);
            }).catch(() => {
              // Fallback
              const ta = document.createElement('textarea');
              ta.value = text;
              ta.style.position = 'fixed';
              ta.style.opacity = '0';
              document.body.appendChild(ta);
              ta.select();
              try { document.execCommand('copy'); } catch (e) {}
              document.body.removeChild(ta);
            });
          });

          pre.appendChild(btn);
        });
      };

      // Re-run after docsify renders new content
      const observer = new MutationObserver(() => {
        addCopyButtons();
      });

      if (document.readyState !== 'loading') {
        observer.observe(document.querySelector('.content') || document.body, { childList: true, subtree: true });
        setTimeout(addCopyButtons, 500);
      } else {
        document.addEventListener('DOMContentLoaded', () => {
          observer.observe(document.querySelector('.content') || document.body, { childList: true, subtree: true });
          setTimeout(addCopyButtons, 500);
        });
      }
    })();
  </script>
</body>
</html>
